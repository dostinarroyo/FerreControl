<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">Ferrecontrol</a>
        <div class="d-flex">
            <a class="btn btn-outline-light btn-sm" th:href="@{/logout}">Cerrar sesión</a>
        </div>
    </div>
</nav>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 th:text="${titulo}">Productos</h1>
        <a class="btn btn-primary" th:href="@{/productos/nuevo}">Nuevo Producto</a>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
        <div class="col" th:each="p : ${productos}">
            <div class="card h-100 shadow-sm">
                <img th:src="${p.imagenUrl != null && !#strings.isEmpty(p.imagenUrl) ? p.imagenUrl : 'https://via.placeholder.com/400x240?text=Sin+imagen'}" class="card-img-top" alt="Imagen del producto" style="object-fit: cover; height: 220px;" />
                <div class="card-body d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <span class="badge bg-secondary">ID <span th:text="${p.id}">1</span></span>
                        <span class="badge bg-info text-dark" th:text="${p.categoria != null ? p.categoria.nombre : 'Sin categoría'}">Categoría</span>
                    </div>
                    <h5 class="card-title" th:text="${p.nombre}">Nombre</h5>
                    <p class="card-text text-muted mb-3" th:text="${p.descripcion}">Descripción</p>
                    <ul class="list-group list-group-flush mb-3">
                        <li class="list-group-item px-0 py-2">Precio: <strong th:text="${p.precio}">0.00</strong></li>
                        <li class="list-group-item px-0 py-2">Stock: <strong th:text="${p.stock}">0</strong></li>
                        <li class="list-group-item px-0 py-2">Imagen: <strong th:text="${p.imagenUrl != null && !#strings.isEmpty(p.imagenUrl) ? 'Sí' : 'No'}">No</strong></li>
                    </ul>
                    <div class="mt-auto d-flex justify-content-between align-items-center">
                        <strong class="text-primary fs-5" th:text="${p.precio}">0.00</strong>
                        <div>
                            <a class="btn btn-sm btn-outline-secondary me-1" th:href="@{/productos/editar/{id}(id=${p.id})}">Editar</a>
                            <a class="btn btn-sm btn-outline-danger" th:href="@{/productos/eliminar/{id}(id=${p.id})}" onclick="return confirm('Eliminar producto?');">Eliminar</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <a class="btn btn-secondary" th:href="@{/}">Volver</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
