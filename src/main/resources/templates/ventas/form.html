<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Formulario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">Ferrecontrol</a>
        <div class="d-flex">
            <a class="btn btn-outline-light btn-sm" th:href="@{/logout}">Cerrar sesión</a>
        </div>
    </div>
</nav>
<div class="container py-4">
    <h1 th:text="${titulo}">Formulario</h1>

    <form th:action="@{/ventas/guardar}" th:object="${venta}" method="post">
        <input type="hidden" th:field="*{id}" />
        <div class="mb-3">
            <label class="form-label">Fecha</label>
            <input type="datetime-local" class="form-control" th:field="*{fecha}" />
        </div>
        <div class="mb-3">
            <label class="form-label">Total</label>
            <input type="number" step="0.01" class="form-control" th:field="*{total}" placeholder="499.90" />
        </div>
        <div class="mb-3">
            <label class="form-label">Cliente</label>
            <input class="form-control" th:field="*{cliente}" placeholder="Juan Pérez" />
        </div>
        <div class="mb-3">
            <label class="form-label">Productos</label>
            <p class="text-muted">Los detalles se gestionan en Detalle de Ventas.</p>
        </div>
        <button class="btn btn-primary" type="submit">Guardar</button>
        <a class="btn btn-secondary" th:href="@{/ventas}">Cancelar</a>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
