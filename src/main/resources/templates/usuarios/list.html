<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .page-header { margin-top: 2rem; }
        .table thead { background: #eef2ff; }
        .table thead th { color: #1d4ed8; }
        .card-table { border-radius: 26px; box-shadow: 0 24px 60px rgba(15, 23, 42, .08); border: none; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/}">Ferrecontrol</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <div class="ms-auto">
                <a class="btn btn-outline-light btn-sm" th:href="@{/usuarios/nuevo}">Nuevo usuario</a>
            </div>
        </div>
    </div>
</nav>
<div class="container py-5">
    <div class="page-header mb-4">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-3">
            <div>
                <h1 class="h3" th:text="${titulo}">Usuarios</h1>
                <p class="text-muted">Lista de usuarios registrados y sus roles.</p>
            </div>
            <div class="d-flex gap-2 align-items-center">
                <a class="btn btn-outline-secondary btn-lg" th:href="@{/logout}">Cerrar sesión</a>
                <a class="btn btn-primary btn-lg" th:href="@{/usuarios/nuevo}">Crear usuario</a>
            </div>
        </div>
    </div>

    <div class="card card-table p-4 mb-4">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Rol</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${usuarios}">
                    <td th:text="${u.id}">1</td>
                    <td th:text="${u.nombre}">Nombre</td>
                    <td th:text="${u.correo}">correo@x</td>
                    <td>
                        <span class="badge bg-secondary" th:text="${u.rol}">ROL</span>
                    </td>
                    <td>
                        <div class="d-flex gap-2 flex-wrap">
                            <a class="btn btn-sm btn-outline-secondary" th:href="@{/usuarios/editar/{id}(id=${u.id})}">Editar</a>
                            <a class="btn btn-sm btn-outline-danger" th:href="@{/usuarios/eliminar/{id}(id=${u.id})}" onclick="return confirm('Eliminar usuario?');">Eliminar</a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <a class="btn btn-outline-secondary" th:href="@{/}">Volver al inicio</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
