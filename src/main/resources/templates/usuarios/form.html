<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Formulario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .form-card {
            border-radius: 26px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, .08);
            border: none;
        }
        .page-header { margin-top: 2rem; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/}">Ferrecontrol</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <div class="ms-auto">
                <a class="btn btn-outline-light btn-sm" th:href="@{/usuarios}">Volver a usuarios</a>
            </div>
        </div>
    </div>
</nav>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card form-card p-4">
                <div class="card-body">
                    <div class="page-header mb-4">
                        <h1 class="h3" th:text="${titulo}">Formulario</h1>
                        <p class="text-muted">Completa los datos para registrar el usuario.</p>
                    </div>
                    <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post">
                        <input type="hidden" th:field="*{id}" />
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Nombre</label>
                                <input class="form-control form-control-lg" th:field="*{nombre}" placeholder="Ej. Juan Pérez" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Correo</label>
                                <input type="email" class="form-control form-control-lg" th:field="*{correo}" placeholder="correo@ejemplo.com" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Contraseña</label>
                                <input type="password" class="form-control form-control-lg" th:field="*{password}" placeholder="••••••••" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Rol</label>
                                <select class="form-select form-select-lg" th:field="*{rol}">
                                    <option value="ADMIN">ADMIN</option>
                                    <option value="VENDEDOR">VENDEDOR</option>
                                </select>
                            </div>
                        </div>
                        <div class="mt-4 d-flex gap-2 flex-wrap">
                            <a class="btn btn-outline-secondary btn-lg" th:href="@{/logout}">Cerrar sesión</a>
                            <button class="btn btn-primary btn-lg" type="submit">Guardar usuario</button>
                            <a class="btn btn-outline-secondary btn-lg" th:href="@{/usuarios}">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
