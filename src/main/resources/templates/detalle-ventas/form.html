<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Formulario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">Ferrecontrol</a>
        <div class="d-flex">
            <a class="btn btn-outline-light btn-sm" th:href="@{/logout}">Cerrar sesión</a>
        </div>
    </div>
</nav>
<div class="container py-4">
    <h1 th:text="${titulo}">Formulario</h1>

    <form th:action="@{/detalle-ventas/guardar}" th:object="${detalleVenta}" method="post">
        <input type="hidden" th:field="*{id}" />
        <div class="mb-3">
            <label class="form-label">Venta</label>
            <select class="form-select" th:field="*{venta}">
                <option value="" th:text="'Seleccione una venta'"></option>
                <option th:each="v : ${ventas}" th:value="${v.id}" th:text="${'Venta #' + v.id + ' - ' + v.cliente}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Producto</label>
            <select class="form-select" th:field="*{producto}">
                <option value="" th:text="'Seleccione un producto'"></option>
                <option th:each="p : ${productos}" th:value="${p.id}" th:text="${p.nombre}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Cantidad</label>
            <input type="number" class="form-control" th:field="*{cantidad}" placeholder="2" />
        </div>
        <div class="mb-3">
            <label class="form-label">Precio Unitario</label>
            <input type="number" step="0.01" class="form-control" th:field="*{precioUnitario}" placeholder="125.00" />
        </div>
        <div class="mb-3">
            <label class="form-label">Subtotal</label>
            <input type="number" step="0.01" class="form-control" th:field="*{subtotal}" placeholder="250.00" />
        </div>
        <button class="btn btn-primary" type="submit">Guardar</button>
        <a class="btn btn-secondary" th:href="@{/detalle-ventas}">Cancelar</a>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
