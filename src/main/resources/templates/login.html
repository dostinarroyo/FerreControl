<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Ferrecontrol</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, rgba(79, 70, 229, .18), transparent 28%),
                        radial-gradient(circle at bottom right, rgba(16, 185, 129, .14), transparent 30%),
                        #f8fafc;
            min-height: 100vh;
        }
        .login-card {
            border-radius: 28px;
            overflow: hidden;
            border: none;
            box-shadow: 0 30px 60px rgba(15, 23, 42, .12);
        }
        .login-card .card-body {
            padding: 2.5rem;
        }
        .brand-label {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            padding: .5rem 1rem;
            border-radius: 999px;
            background: rgba(79, 70, 229, .12);
            color: #4f46e5;
            font-weight: 700;
        }
        .welcome-title {
            color: #111827;
        }
        .login-footer a {
            color: #2563eb;
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-12 col-md-8 col-lg-5">
            <div class="card login-card">
                <div class="card-body">
                    <div class="mb-4 text-center">
                        <span class="brand-label">Ferrecontrol</span>
                        <h2 class="mt-4 mb-2 welcome-title">Bienvenido de nuevo</h2>
                        <p class="text-muted mb-0">Accede al panel y gestiona tu ferretería con estilo.</p>
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Correo</label>
                            <input type="email" name="username" class="form-control form-control-lg" placeholder="usuario@ferrecontrol.com" required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" name="password" class="form-control form-control-lg" placeholder="Contraseña" required />
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="rememberMe" name="remember-me" />
                            <label class="form-check-label" for="rememberMe">Recordarme</label>
                        </div>
                        <div th:if="${param.error}" class="alert alert-danger">Usuario o contraseña inválidos.</div>
                        <div th:if="${param.logout}" class="alert alert-success">Sesión cerrada correctamente.</div>
                        <button class="btn btn-primary btn-lg w-100" type="submit">Ingresar</button>
                    </form>
                    <div class="mt-4 text-center login-footer">
                        <p class="text-muted mb-3">¿Aún no tienes cuenta?</p>
                        <a th:href="@{/register}" class="btn btn-outline-primary btn-lg w-100">Crear cuenta</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
